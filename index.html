<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Explore Purworejo</title>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {font-family: Arial; padding:20px;}
h1 {text-align:center;}

#map {height:400px; margin-top:20px;}

button {
  background: green;
  color: white;
  padding: 10px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

table {
  margin-top:20px;
  width:100%;
  border-collapse: collapse;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
}
</style>
</head>

<body>

<h1>🌍 Explore Purworejo</h1>

<button onclick="getLocation()">Cari Wisata Terdekat</button>
<div id="nearest"></div>

<div id="map"></div>

<h3>Analisis Jarak dari Pusat Kota</h3>
<table>
<thead>
<tr>
<th>Nama</th>
<th>Kategori</th>
<th>Jarak (km)</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= DATA =================
const wisata = [
{nama:"Pantai Dewaruci Jatimalang", kategori:"Pantai", lat:-7.878488522921065, lng:109.98290759583354},
{nama:"Goa Seplawan", kategori:"Alam", lat:-7.772916529031929, lng:110.11025250192166},
{nama:"Curug Siklotok", kategori:"Air Terjun", lat:-7.741915193999638, lng:110.09125668194677},
{nama:"Museum Tosan Aji", kategori:"Budaya", lat:-7.710870709449446, lng:110.01001510073746},
{nama:"Pantai Ketawang", kategori:"Pantai", lat:-7.846256051815044, lng:109.88613064457545},
{nama:"Alun-Alun Purworejo", kategori:"Kota", lat:-7.712973636896891, lng:110.00902063854716},
{nama:"Desa Wisata Pandanrejo", kategori:"Desa", lat:-7.7231988246578025, lng:110.12760601146873},
{nama:"Bedug Pendowo", kategori:"Religi", lat:-7.708576641413623, lng:110.00824123554514},
{nama:"Pantai Jetis", kategori:"Pantai", lat:-7.849204843385032, lng:109.89531572556669},
{nama:"Curug Muncar", kategori:"Air Terjun", lat:-7.533894631115022, lng:109.94135499476945},
{nama:"Heroes Park", kategori:"Kota", lat:-7.72502373290337, lng:110.01246876377968},
{nama:"Hutan Pinus Kalilo", kategori:"Alam", lat:-7.751500090098405, lng:110.11981455890982},
{nama:"Demaji Eco Park", kategori:"Desa", lat:-7.731948963926859, lng:110.08076262858565},
{nama:"Gunung Kunir", kategori:"Alam", lat:-7.629396391238906, lng:110.12741859956478},
{nama:"Dawet Jembatan Butuh", kategori:"Kuliner", lat:--7.721907341283093, lng:109.8550094303513}
];

// ================= PETA =================
const map = L.map('map').setView([-7.7,109.95],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

wisata.forEach(w=>{
  L.marker([w.lat,w.lng])
  .addTo(map)
  .bindPopup(`<b>${w.nama}</b><br>${w.kategori}`);
});

// ================= HAVERSINE =================
function jarak(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R*(2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ================= ANALISIS =================
const center = {lat:-7.713, lng:110.008};
const table = document.getElementById("table");

wisata.forEach(w=>{
  const d = jarak(center.lat, center.lng, w.lat, w.lng).toFixed(2);

  table.innerHTML += `
  <tr>
    <td>${w.nama}</td>
    <td>${w.kategori}</td>
    <td>${d}</td>
  </tr>`;
});

// ================= WISATA TERDEKAT =================
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const user = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    const hasil = wisata.map(w=>({
      ...w,
      d: jarak(user.lat, user.lng, w.lat, w.lng)
    }))
    .sort((a,b)=>a.d-b.d)
    .slice(0,5);

    let html = "<h3>Wisata Terdekat:</h3>";
    hasil.forEach(w=>{
      html += `<p>${w.nama} - ${w.d.toFixed(2)} km</p>`;
    });

    document.getElementById("nearest").innerHTML = html;
  });
}
</script>

</body>
</html>
